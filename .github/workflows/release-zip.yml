name: Build and Package Release

on:
  workflow_dispatch:

permissions:
  attestations: write
  contents: write
  id-token: write

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Read manifest metadata
        id: meta
        shell: bash
        run: |
          ID=$(node -p "require('./manifest.json').id")
          VERSION=$(node -p "require('./manifest.json').version")
          echo "id=${ID}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "zip_name=${ID}-${VERSION}.zip" >> "$GITHUB_OUTPUT"

      - name: Prepare package directory
        run: |
          mkdir -p dist
          cp manifest.json dist/
          cp main.js dist/

      - name: Create zip
        run: |
          cd dist
          zip -r "../${{ steps.meta.outputs.zip_name }}" .

      - name: Attest main.js provenance
        uses: actions/attest@v4
        with:
          subject-path: main.js

      - name: Attest manifest.json provenance
        uses: actions/attest@v4
        with:
          subject-path: manifest.json

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.id }}-${{ steps.meta.outputs.version }}
          path: dist/

      - name: Create version tag if missing
        shell: bash
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          if git ls-remote --tags origin "refs/tags/${VERSION}" | grep -q "refs/tags/${VERSION}$"; then
            echo "Tag ${VERSION} already exists."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "${VERSION}"
            git push origin "${VERSION}"
          fi

      - name: Generate release notes from commits
        id: release_notes
        shell: bash
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          PREVIOUS_TAG=$(git tag --sort=-version:refname | grep -Fxv "$VERSION" | head -n 1)

          {
            echo "body<<EOF"
            echo "## Changes"
            echo

            if [ -n "$PREVIOUS_TAG" ]; then
              git log --no-merges --pretty=format:'- %s' "${PREVIOUS_TAG}..HEAD"
            else
              git log --no-merges --pretty=format:'- %s'
            fi

            echo
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.version }}
          body: ${{ steps.release_notes.outputs.body }}
          files: |
            manifest.json
            main.js
          fail_on_unmatched_files: true
