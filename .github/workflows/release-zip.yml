name: Build and Package Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Read manifest metadata
        id: meta
        shell: bash
        run: |
          ID=$(node -p "require('./manifest.json').id")
          VERSION=$(node -p "require('./manifest.json').version")
          echo "id=${ID}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "zip_name=${ID}-${VERSION}.zip" >> "$GITHUB_OUTPUT"

      - name: Prepare package directory
        run: |
          mkdir -p dist
          cp manifest.json dist/
          cp main.js dist/
          cp versions.json dist/

      - name: Create zip
        run: |
          cd dist
          zip -r "../${{ steps.meta.outputs.zip_name }}" .

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.id }}-${{ steps.meta.outputs.version }}
          path: dist/

      - name: Create version tag if missing
        shell: bash
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          if git ls-remote --tags origin "refs/tags/${VERSION}" | grep -q "refs/tags/${VERSION}$"; then
            echo "Tag ${VERSION} already exists."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "${VERSION}"
            git push origin "${VERSION}"
          fi

      - name: Create or update GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.version }}
          files: |
            ${{ steps.meta.outputs.zip_name }}
            manifest.json
            main.js
            versions.json
          fail_on_unmatched_files: true
